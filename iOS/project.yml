name: AquaponicsLog
options:
  bundleIdPrefix: com.shimondeitel.aquaponicslog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  AquaponicsLog:
    type: application
    platform: iOS
    sources:
      - path: AquaponicsLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.aquaponicslog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: AquaponicsLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  AquaponicsLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AquaponicsLogTests
      - path: AquaponicsLog.storekit
    dependencies:
      - target: AquaponicsLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.aquaponicslog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  AquaponicsLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AquaponicsLogUITests
    dependencies:
      - target: AquaponicsLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.aquaponicslog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  AquaponicsLog:
    build:
      targets:
        AquaponicsLog: all
        AquaponicsLogTests: [test]
        AquaponicsLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: AquaponicsLog.storekit
    test:
      config: Debug
      storeKitConfiguration: AquaponicsLog.storekit
      targets:
        - AquaponicsLogTests
        - AquaponicsLogUITests
    archive:
      config: Release
